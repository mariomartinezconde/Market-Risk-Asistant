[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
log_cli = true
log_cli_level = WARNING
markers =
    integration: marks tests that require embedding model or disk I/O (slower)
    llm: marks tests that make real Anthropic API calls (require ANTHROPIC_API_KEY)
